version: '3.9'

services:

  # ─── PostgreSQL + pgvector ───────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: talentstream_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tsuser
      POSTGRES_PASSWORD: tspassword
      POSTGRES_DB: talentstream
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsuser -d talentstream"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: talentstream_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: tsuser
      RABBITMQ_DEFAULT_PASS: tspassword
      RABBITMQ_ERLANG_COOKIE: "talentstream-secret-cookie"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s


  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentstream_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://tsuser:tspassword@db:5432/talentstream
      RABBITMQ_URL: amqp://tsuser:tspassword@rabbitmq:5672
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Worker 1: Embedding Filter ───────────────────────────────────────────────
  worker_embedding:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./worker/.env
    environment:
      DATABASE_URL: postgresql://tsuser:tspassword@db:5432/talentstream
      RABBITMQ_URL: amqp://tsuser:tspassword@rabbitmq:5672
    command: ["python", "-u", "embedding_filter_worker.py"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Worker 2: LLM Evaluation ────────────────────────────────────────────────
  worker_llm:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./worker/.env
    environment:
      DATABASE_URL: postgresql://tsuser:tspassword@db:5432/talentstream
      RABBITMQ_URL: amqp://tsuser:tspassword@rabbitmq:5672
    command: ["python", "-u", "llm_evaluation_worker.py"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentstream_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: