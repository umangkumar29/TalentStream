name: TalentStream Auto-Deployment 🚀

on:
  push:
    branches:
      - main

# Force workflow runner to use future-proof node versions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy Application to Azure VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Remote SSH Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            echo "⚡ Starting Auto-Deployment on Azure..."
            cd /home/azureuser/TalentStream/TalentStream
            git pull origin main
            echo "🐳 Rebuilding and spinning up Docker containers..."
            sudo docker compose down
            sudo docker compose up -d --build
            echo "🎉 TalentStream is successfully deployed and running!"
